<svg viewBox="0 0 480 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="480" height="400" rx="56" fill="#EEF2FF"/>

  <!-- ── BODY ─────────────────────────────────────────────────────────── -->
  <!-- Left arm (viewer-left = char right) reaching toward clipboard -->
  <path d="M 290 310 Q 320 295 345 310 Q 362 322 355 345"
        stroke="#4338ca" stroke-width="30" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right arm (viewer-right = char left) – tucked / holding bottom of board -->
  <path d="M 110 310 Q 80 295 65 312 Q 52 328 60 348"
        stroke="#4338ca" stroke-width="30" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Torso -->
  <path d="M 95 400 L 95 308 Q 95 288 118 284
           L 148 279 L 200 286 L 252 279
           Q 275 284 275 308 L 275 400 Z"
        fill="#4f46e5"/>

  <!-- Shirt plaid hint – horizontal stripes -->
  <rect x="95" y="320" width="180" height="4" fill="#4338ca" opacity="0.55"/>
  <rect x="95" y="340" width="180" height="4" fill="#4338ca" opacity="0.55"/>
  <rect x="95" y="360" width="180" height="4" fill="#4338ca" opacity="0.55"/>
  <!-- Shirt centre button placket -->
  <rect x="196" y="286" width="8" height="114" fill="#4338ca" opacity="0.5"/>

  <!-- Breast pocket -->
  <rect x="148" y="298" width="28" height="22" rx="4" fill="#4338ca" opacity="0.8"/>
  <line x1="148" y1="311" x2="176" y2="311" stroke="#3730a3" stroke-width="1.5"/>

  <!-- ── NECK ────────────────────────────────────────────────────────── -->
  <rect x="183" y="268" width="34" height="22" rx="7" fill="#f4a471"/>

  <!-- ── HEAD ─────────────────────────────────────────────────────────── -->
  <circle cx="200" cy="218" r="66" fill="#f4a471"/>

  <!-- Ears -->
  <ellipse cx="134" cy="222" rx="10" ry="14" fill="#f4a471"/>
  <ellipse cx="134" cy="222" rx="5"  ry="8"  fill="#e8885c" opacity="0.45"/>
  <ellipse cx="266" cy="222" rx="10" ry="14" fill="#f4a471"/>
  <ellipse cx="266" cy="222" rx="5"  ry="8"  fill="#e8885c" opacity="0.45"/>

  <!-- ── TRUCKER HAT ─────────────────────────────────────────────────── -->
  <!-- Back panel (mesh – slightly lighter navy) -->
  <path d="M 200 122 Q 268 122 268 180 L 230 180 Q 228 138 200 133 Z"
        fill="#1e3a5f"/>
  <!-- Front panel -->
  <path d="M 200 133 Q 172 138 170 180 L 200 180 Z" fill="#0f1f38"/>
  <path d="M 200 133 L 200 180 L 230 180 Q 228 138 200 133 Z" fill="#0f1f38"/>
  <path d="M 132 180 Q 132 122 200 122 Q 200 122 200 133 Q 172 138 170 180 Z"
        fill="#0f1f38"/>
  <!-- Structured band -->
  <rect x="132" y="177" width="136" height="11" rx="3" fill="#0a1628"/>
  <!-- Flat brim -->
  <path d="M 122 188 L 278 188 L 271 205 L 129 205 Z" fill="#0a1628"/>
  <!-- Brim underside glow -->
  <path d="M 129 205 L 271 205 L 269 201 L 131 201 Z" fill="#1e3a5f" opacity="0.7"/>
  <!-- Hat button -->
  <circle cx="200" cy="124" r="6" fill="#2d4a6b"/>
  <!-- Front patch -->
  <rect x="178" y="134" width="44" height="30" rx="5" fill="#1a3560" opacity="0.6"/>
  <text x="200" y="155" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="20" font-weight="900" fill="#93c5fd" opacity="0.9">B</text>

  <!-- ── FACE ──────────────────────────────────────────────────────────── -->
  <!-- Brow wrinkle (middle-age) -->
  <line x1="197" y1="215" x2="203" y2="215" stroke="#e8835a" stroke-width="1.5"
        stroke-linecap="round" opacity="0.5"/>

  <!-- Eyebrows – slightly furrowed, bushy -->
  <path d="M 163 213 Q 174 206 186 210"
        stroke="#5c3d1e" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M 214 210 Q 226 206 237 213"
        stroke="#5c3d1e" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <ellipse cx="175" cy="224" rx="10" ry="10.5" fill="white"/>
  <ellipse cx="225" cy="224" rx="10" ry="10.5" fill="white"/>
  <circle  cx="177" cy="226" r="7"   fill="#2d1f13"/>
  <circle  cx="227" cy="226" r="7"   fill="#2d1f13"/>
  <!-- Pupils -->
  <circle  cx="179" cy="223" r="2.5" fill="white"/>
  <circle  cx="229" cy="223" r="2.5" fill="white"/>
  <!-- Crow's feet -->
  <path d="M 186 220 Q 190 217 192 220" stroke="#e8835a" stroke-width="1.2"
        fill="none" opacity="0.4"/>
  <path d="M 208 220 Q 210 217 214 220" stroke="#e8835a" stroke-width="1.2"
        fill="none" opacity="0.4"/>

  <!-- Nose -->
  <path d="M 200 232 Q 191 244 193 251 Q 200 256 207 251 Q 209 244 200 232"
        fill="#e8835a"/>
  <circle cx="194" cy="249" r="3.5" fill="#c97040" opacity="0.55"/>
  <circle cx="206" cy="249" r="3.5" fill="#c97040" opacity="0.55"/>

  <!-- Mouth – concentrated smirk -->
  <path d="M 186 263 Q 200 270 214 264"
        stroke="#b85a30" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Stubble (chin & cheeks) -->
  <circle cx="176" cy="258" r="2.2" fill="#b85a30" opacity="0.38"/>
  <circle cx="183" cy="265" r="2.2" fill="#b85a30" opacity="0.38"/>
  <circle cx="191" cy="269" r="2.2" fill="#b85a30" opacity="0.38"/>
  <circle cx="200" cy="271" r="2.2" fill="#b85a30" opacity="0.38"/>
  <circle cx="209" cy="269" r="2.2" fill="#b85a30" opacity="0.38"/>
  <circle cx="217" cy="265" r="2.2" fill="#b85a30" opacity="0.38"/>
  <circle cx="224" cy="258" r="2.2" fill="#b85a30" opacity="0.38"/>
  <!-- Upper lip -->
  <circle cx="191" cy="260" r="1.8" fill="#b85a30" opacity="0.3"/>
  <circle cx="199" cy="258" r="1.8" fill="#b85a30" opacity="0.3"/>
  <circle cx="207" cy="260" r="1.8" fill="#b85a30" opacity="0.3"/>

  <!-- ── RIGHT HAND (viewer-right) holding pen ──────────────────────── -->
  <circle cx="355" cy="347" r="16" fill="#f4a471"/>

  <!-- ── CLIPBOARD ──────────────────────────────────────────────────── -->
  <!-- Shadow -->
  <rect x="304" y="278" width="120" height="148" rx="9"
        fill="black" opacity="0.07" transform="translate(4,5)"/>
  <!-- Board -->
  <rect x="304" y="278" width="120" height="148" rx="9"
        fill="#fffdf6" stroke="#ddd0b0" stroke-width="2.5"/>
  <!-- Clip body -->
  <rect x="336" y="267" width="56" height="18" rx="7" fill="#94a3b8"/>
  <!-- Clip grip -->
  <rect x="342" y="262" width="44" height="13" rx="5" fill="#64748b"/>
  <!-- Clip opening slit -->
  <rect x="347" y="267" width="34" height="7" rx="3" fill="#e2e8f0"/>
  <!-- Paper lines -->
  <line x1="318" y1="304" x2="410" y2="304" stroke="#e5d9c2" stroke-width="2"/>
  <line x1="318" y1="318" x2="410" y2="318" stroke="#e5d9c2" stroke-width="2"/>
  <line x1="318" y1="332" x2="410" y2="332" stroke="#e5d9c2" stroke-width="2"/>
  <line x1="318" y1="346" x2="410" y2="346" stroke="#e5d9c2" stroke-width="2"/>
  <line x1="318" y1="360" x2="410" y2="360" stroke="#e5d9c2" stroke-width="2"/>
  <line x1="318" y1="374" x2="395" y2="374" stroke="#e5d9c2" stroke-width="2"/>
  <!-- Written text – a little squiggle suggesting handwriting -->
  <path d="M 318 304 Q 330 300 345 304 Q 358 308 370 304"
        stroke="#4f46e5" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M 318 318 Q 340 314 360 318"
        stroke="#4f46e5" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- ── PENCIL (held by right hand) ──────────────────────────────── -->
  <g transform="rotate(-38 355 347)">
    <!-- Body -->
    <rect x="350" y="295" width="11" height="54" rx="5" fill="#fbbf24"/>
    <!-- Ferrule -->
    <rect x="350" y="295" width="11" height="7" rx="3" fill="#9ca3af"/>
    <!-- Eraser -->
    <rect x="350" y="288" width="11" height="8" rx="4" fill="#f87171"/>
    <!-- Tip cone -->
    <polygon points="350,349 361,349 355.5,366" fill="#e09a00"/>
    <!-- Graphite -->
    <polygon points="352,358 359,358 355.5,366" fill="#374151"/>
  </g>

  <!-- ── LEFT HAND (viewer-left) at arm end ───────────────────────── -->
  <circle cx="60" cy="349" r="14" fill="#f4a471"/>

</svg>
