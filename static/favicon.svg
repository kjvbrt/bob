<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f1f38"/>

  <!-- ── HAT ─────────────────────────────────────────────────── -->
  <!-- Crown back panel (lighter) -->
  <path d="M 32 10 Q 52 10 52 27 L 41 27 Q 40 16 32 15 Z" fill="#1e3a5f"/>
  <!-- Crown front panel -->
  <path d="M 32 15 Q 23 16 22 27 L 32 27 Z" fill="#0a1628"/>
  <path d="M 32 15 L 32 27 L 41 27 Q 40 16 32 15 Z" fill="#0a1628"/>
  <path d="M 12 27 Q 12 10 32 10 L 32 15 Q 23 16 22 27 Z" fill="#0a1628"/>
  <!-- Band -->
  <rect x="12" y="25" width="40" height="5" rx="1.5" fill="#07101e"/>
  <!-- Brim -->
  <path d="M 9 30 L 55 30 L 53 37 L 11 37 Z" fill="#07101e"/>
  <!-- Hat button -->
  <circle cx="32" cy="11" r="2" fill="#2d4a6b"/>

  <!-- ── FACE ─────────────────────────────────────────────────── -->
  <circle cx="32" cy="44" r="18" fill="#f4a471"/>

  <!-- Eyes -->
  <circle cx="26" cy="42" r="3.5" fill="white"/>
  <circle cx="38" cy="42" r="3.5" fill="white"/>
  <circle cx="27" cy="43" r="2.2" fill="#1e1208"/>
  <circle cx="39" cy="43" r="2.2" fill="#1e1208"/>
  <circle cx="27.8" cy="41.8" r="0.9" fill="white"/>
  <circle cx="39.8" cy="41.8" r="0.9" fill="white"/>

  <!-- Eyebrows -->
  <path d="M 22 38 Q 26 35.5 30 37"
        stroke="#5c3d1e" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 34 37 Q 38 35.5 42 38"
        stroke="#5c3d1e" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Nose -->
  <ellipse cx="32" cy="48" rx="3" ry="2" fill="#e8835a"/>

  <!-- Mouth / smirk -->
  <path d="M 27 54 Q 32 57 37 54"
        stroke="#b85a30" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Stubble dots -->
  <circle cx="25" cy="53" r="1.1" fill="#b85a30" opacity="0.45"/>
  <circle cx="28" cy="56" r="1.1" fill="#b85a30" opacity="0.45"/>
  <circle cx="32" cy="57" r="1.1" fill="#b85a30" opacity="0.45"/>
  <circle cx="36" cy="56" r="1.1" fill="#b85a30" opacity="0.45"/>
  <circle cx="39" cy="53" r="1.1" fill="#b85a30" opacity="0.45"/>

  <!-- ── TINY CLIPBOARD badge (bottom-right corner) ────────────── -->
  <rect x="44" y="50" width="14" height="13" rx="2.5"
        fill="#fffdf6" stroke="#ccc0a0" stroke-width="1.2"/>
  <rect x="48" y="47" width="6"  height="5"  rx="1.5" fill="#64748b"/>
  <line x1="46" y1="55" x2="57" y2="55" stroke="#ddd0b0" stroke-width="1"/>
  <line x1="46" y1="58" x2="57" y2="58" stroke="#ddd0b0" stroke-width="1"/>
  <line x1="46" y1="61" x2="54" y2="61" stroke="#ddd0b0" stroke-width="1"/>

</svg>
