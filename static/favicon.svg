<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!--
      Gap angles staggered 197° / 214° / 228° / 244° (~16° per step, 47° total sweep).
      Gap width ≈ 65°.  Black = hide, white = show.

      Gap centre coords: (16 + r·sin α,  16 − r·cos α)
        r=4,  α=197°  → (14.8, 19.8)
        r=7,  α=214°  → (12.1, 21.8)
        r=10, α=228°  → ( 8.6, 22.7)
        r=13, α=244°  → ( 4.3, 21.7)
    -->

    <!-- r=4, gap at 197° -->
    <radialGradient id="g1" cx="14.8" cy="19.8" r="2.9" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="black"/>
      <stop offset="40%"  stop-color="black"/>
      <stop offset="75%"  stop-color="white"/>
      <stop offset="100%" stop-color="white"/>
    </radialGradient>
    <mask id="m1"><rect width="32" height="32" fill="url(#g1)"/></mask>

    <!-- r=7, gap at 214° -->
    <radialGradient id="g2" cx="12.1" cy="21.8" r="5.1" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="black"/>
      <stop offset="40%"  stop-color="black"/>
      <stop offset="75%"  stop-color="white"/>
      <stop offset="100%" stop-color="white"/>
    </radialGradient>
    <mask id="m2"><rect width="32" height="32" fill="url(#g2)"/></mask>

    <!-- r=10, gap at 228° -->
    <radialGradient id="g3" cx="8.6" cy="22.7" r="7.3" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="black"/>
      <stop offset="40%"  stop-color="black"/>
      <stop offset="75%"  stop-color="white"/>
      <stop offset="100%" stop-color="white"/>
    </radialGradient>
    <mask id="m3"><rect width="32" height="32" fill="url(#g3)"/></mask>

    <!-- r=13, gap at 244° -->
    <radialGradient id="g4" cx="4.3" cy="21.7" r="9.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="black"/>
      <stop offset="40%"  stop-color="black"/>
      <stop offset="75%"  stop-color="white"/>
      <stop offset="100%" stop-color="white"/>
    </radialGradient>
    <mask id="m4"><rect width="32" height="32" fill="url(#g4)"/></mask>
  </defs>

  <!-- Dark green background -->
  <circle cx="16" cy="16" r="16" fill="#1A5C38"/>

  <!-- 4 concentric rings — light mint at centre fading to deeper green at outside -->
  <circle cx="16" cy="16" r="4"  fill="none" stroke="#C2EAD0" stroke-width="1.1" mask="url(#m1)"/>
  <circle cx="16" cy="16" r="7"  fill="none" stroke="#92D4AB" stroke-width="1.2" mask="url(#m2)"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#6DC68A" stroke-width="1.2" mask="url(#m3)"/>
  <circle cx="16" cy="16" r="13" fill="none" stroke="#4EB374" stroke-width="1.3" mask="url(#m4)"/>
</svg>
