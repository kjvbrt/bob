{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — Bob the Tracker</title>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] }
        }
      }
    }
  </script>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-stone-100 min-h-screen font-sans antialiased" hx-boost="false">

  <!-- Navigation -->
  <header class="bg-white border-b border-stone-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5">
        <img src="/static/favicon.svg" alt="Bob the Tracker" class="w-9 h-9 rounded-xl shadow-sm"/>
        <div>
          <span class="font-semibold text-stone-900 tracking-tight text-lg">Bob the Tracker</span>
          <span class="ml-2 text-xs font-medium text-indigo-500 tracking-wide hidden sm:inline">FCC Dataset Requests</span>
        </div>
      </a>

      <nav class="flex items-center gap-1">
        <a href="/"
           class="px-4 py-2 rounded-xl text-sm font-medium transition-colors
                  {{if eq .Title "Dashboard"}}bg-indigo-50 text-indigo-700{{else}}text-stone-600 hover:bg-stone-100 hover:text-stone-900{{end}}">
          Dashboard
        </a>
        <a href="/requests"
           class="px-4 py-2 rounded-xl text-sm font-medium transition-colors
                  {{if eq .Title "All Requests"}}bg-indigo-50 text-indigo-700{{else}}text-stone-600 hover:bg-stone-100 hover:text-stone-900{{end}}">
          Requests
        </a>
      </nav>

      <button
        hx-get="/requests/new"
        hx-target="#modal-container"
        hx-swap="innerHTML"
        onclick="document.getElementById('modal-overlay').classList.remove('hidden')"
        class="flex items-center gap-2 px-4 py-2 rounded-xl bg-indigo-600 text-white text-sm font-medium
               hover:bg-indigo-700 active:scale-95 transition-all shadow-sm">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        New Request
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    {{block "content" .}}{{end}}
  </main>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
    <div id="modal-container"
         class="relative w-full max-w-2xl max-h-[90vh] overflow-y-auto bg-white rounded-3xl shadow-2xl z-10">
    </div>
  </div>

  <script>
    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
      document.getElementById('modal-container').innerHTML = '';
    }
    // Close on Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // After HTMX settles a swap inside the modal, keep overlay visible
    document.body.addEventListener('htmx:afterSwap', function(e) {
      if (e.detail.target.id === 'modal-container') {
        document.getElementById('modal-overlay').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
{{end}}
