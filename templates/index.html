{{define "content"}}
<div class="space-y-6">

  <!-- Page heading -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <div>
      <h1 class="text-2xl font-semibold text-stone-900 dark:text-stone-100">Dashboard</h1>
      <p class="text-sm text-stone-500 mt-0.5">FCC dataset request pipeline — analysis &amp; detector design</p>
    </div>
    {{if .CurrentUser}}
    <a href="/requests/new"
       class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-indigo-600 dark:bg-indigo-900/80 text-white dark:text-indigo-300 text-sm font-medium
              hover:bg-indigo-700 dark:hover:bg-indigo-900 active:scale-95 transition-all shadow-sm dark:shadow-none dark:ring-1 dark:ring-indigo-700/60
              w-full sm:w-auto">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      New Request
    </a>
    {{end}}
  </div>

  <!-- Bento stats grid -->
  <div id="stats-area"
       hx-get="/api/stats"
       hx-trigger="every 30s"
       hx-swap="innerHTML">
    {{template "stats_cards" .}}
  </div>

  <!-- Recent requests -->
  <div>
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold text-stone-900 dark:text-stone-100">Recent Requests</h2>
      <a href="/requests" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">View all →</a>
    </div>
    <div id="recent-area"
         hx-get="/api/recent"
         hx-trigger="every 30s"
         hx-swap="innerHTML">
      {{template "recent_requests" .}}
    </div>
  </div>

</div>
{{end}}
