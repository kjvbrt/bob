{{define "content"}}
<div class="max-w-2xl mx-auto">

  <!-- Breadcrumb -->
  <nav class="flex items-center gap-2 text-sm text-stone-400 mb-6">
    <a href="/" class="hover:text-stone-600 dark:hover:text-stone-300 transition-colors">Home</a>
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
    </svg>
    <a href="/requests" class="hover:text-stone-600 dark:hover:text-stone-300 transition-colors">Requests</a>
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
    </svg>
    <span class="text-stone-500 dark:text-stone-400">{{.Title}}</span>
  </nav>

  <div class="bg-white dark:bg-stone-900 rounded-3xl shadow-sm border border-stone-100 dark:border-stone-800">
    {{template "request_form" .}}
  </div>

</div>
{{end}}
