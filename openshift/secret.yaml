# Fill in real values, then apply with: oc apply -f openshift/secret.yaml
# Never commit this file with actual secrets.
apiVersion: v1
kind: Secret
metadata:
  name: bob-secrets
stringData:
  # PostgreSQL connection string from CERN DBOD.
  # Format: postgresql://user:password@dbod-host.cern.ch:5432/database?sslmode=require
  database-url: ""
  oidc-client-id: ""
  oidc-client-secret: ""
  # Must match the Route hostname below, e.g. https://bob.web.cern.ch/auth/callback
  oidc-redirect-url: ""
